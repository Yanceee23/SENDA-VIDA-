services:
  postgres:
    image: postgres:16
    container_name: senda_vida_postgres
    environment:
      POSTGRES_DB: senda_vida
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - senda_vida_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d senda_vida"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  senda_vida_pgdata:
