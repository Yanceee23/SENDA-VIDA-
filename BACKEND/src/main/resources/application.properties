spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:SENDA_VIDA_JWT_SECRET_SUPER_SEGURO_2024}
jwt.expirationMinutes=1440

openmeteo.url=https://api.open-meteo.com/v1
gbif.url=https://api.gbif.org/v1
gbif.search-radius-km=${GBIF_SEARCH_RADIUS_KM:2}
overpass.url=https://overpass-api.de/api/interpreter
wikidata.url=https://query.wikidata.org/sparql
nominatim.url=https://nominatim.openstreetmap.org
osrm.url=https://router.project-osrm.org
firebase.config=classpath:firebase-service-account.json

# 8080 suele estar ocupado (por ejemplo, por otros servicios locales).
# Puedes sobreescribirlo con la variable de entorno PORT.
server.address=0.0.0.0
server.port=${PORT:8084}
server.servlet.context-path=/api

# Directorio local para fotos subidas (se sirve como /api/uploads/**)
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Evita que Spring Boot cree un usuario por defecto y loguee el password generado
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration